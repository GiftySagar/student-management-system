{% extends 'main.html' %}

{% block content  %}
    <h2>Reset The Password</h2>

    <style>


h2 {
    text-align: center;
    font-family: "Segoe UI", Arial, sans-serif;
    font-size: 32px;
    color: black;
    margin: 20px 0;
    letter-spacing: 1px;
    text-transform: uppercase;
   }

.form-container {
        width: 400px;
        margin: 40px auto;
        padding: 25px;
        background: #ffffff;
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        font-family: Arial, sans-serif;
    }

    .form-container label {
        display: block;
        font-weight: 600;
        margin-bottom: 5px;
        color: #333;
    }

    .form-container input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        margin-bottom: 15px;
        transition: 0.3s;
    }

    .form-container input:focus {
        border-color: #4f46e5;
        outline: none;
        box-shadow: 0 0 5px rgba(79, 70, 229, 0.4);
    }

    .form-container input[readonly] {
        background-color: #f3f4f6;
        cursor: not-allowed;
    }

    .form-container button {
        width: 100%;
        padding: 12px;
        background: #4f46e5;
        border: none;
        color: white;
        font-size: 16px;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
    }

    .form-container button:hover {
        background: #4338ca;
    }
  
body {
        
        
        background: linear-gradient(135deg, #1e3a8a, #2563eb);
        
        
    }
    
    







    </style>


    {% if wrong %}
        <h2>Enter the Correct Old Password..!!</h2>

    {% endif %}
    <center>
        <div class="form-container">
        <form action="" method="POST">
            {% csrf_token %}

            <label for="">User Name:</label>
            <input type="text" name="" id="" value="{{request.user}}" readonly> <br><br>

            {% if newpass %}
            <label for="">New Password: </label>
            <input type="password" name="newpasw" id=""> <br><br>

            {% else %}

            <label for="">Old Password: </label>
            <input type="password" name="oldpasw" id=""> <br><br>

            {% endif %}

            <button type="submit">Submit</button>
        </form>
        </div>
    </center>
{% endblock %}
